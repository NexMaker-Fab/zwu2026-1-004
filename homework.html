<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Homework | Aether Studio</title>
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --text-primary: #FFFFFF;
            --text-secondary: #999999;
            --accent-purple: #B8A9FF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-menu a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--accent-purple);
        }

        /* Homework Page */
        .homework-page {
            padding-top: 120px;
            min-height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
            padding-left: 4rem;
            padding-right: 4rem;
            padding-bottom: 4rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-align: center;
            margin-bottom: 4rem;
        }

        /* Homework Item */
        .homework-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .homework-item:hover {
            border-color: var(--accent-purple);
        }

        .homework-item.active {
            border-color: var(--accent-purple);
            box-shadow: 0 0 30px rgba(184, 169, 255, 0.1);
        }

        /* Homework Header (Clickable) */
        .homework-header {
            padding: 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .homework-header:hover {
            background: rgba(184, 169, 255, 0.05);
        }

        .homework-info {
            flex: 1;
        }

        .homework-number {
            font-size: 0.85rem;
            color: var(--accent-purple);
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .homework-title {
            font-size: 1.3rem;
            font-weight: 400;
        }

        .homework-toggle {
            font-size: 1.5rem;
            color: var(--accent-purple);
            transition: transform 0.3s ease;
        }

        .homework-item.active .homework-toggle {
            transform: rotate(180deg);
        }

        /* Markdown Content Area */
        .homework-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .homework-item.active .homework-content {
            max-height: 5000px;
            opacity: 1;
        }

        .markdown-wrapper {
            padding: 0 2rem 2rem;
            border-top: 1px solid var(--border-light);
        }

        /* Markdown Styles */
        .markdown-content {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .markdown-content h1, 
        .markdown-content h2, 
        .markdown-content h3,
        .markdown-content h4, 
        .markdown-content h5, 
        .markdown-content h6 {
            margin: 1.5rem 0 1rem;
            font-weight: 400;
            color: var(--accent-purple);
        }

        .markdown-content h1 { font-size: 1.8rem; }
        .markdown-content h2 { font-size: 1.5rem; }
        .markdown-content h3 { font-size: 1.2rem; }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content code {
            background: rgba(184, 169, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: var(--accent-purple);
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--border-light);
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--accent-purple);
            padding-left: 1.5rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .markdown-content ul, 
        .markdown-content ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .markdown-content li {
            margin-bottom: 0.5rem;
        }

        .markdown-content a {
            color: var(--accent-purple);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--accent-purple);
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .markdown-content th, 
        .markdown-content td {
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            text-align: left;
        }

        .markdown-content th {
            background: rgba(184, 169, 255, 0.1);
            color: var(--accent-purple);
        }

        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 2rem 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1.5rem 2rem;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.98);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
            }

            .nav-menu.active {
                display: flex;
            }

            .hamburger {
                display: flex;
                flex-direction: column;
                cursor: pointer;
                gap: 5px;
            }

            .hamburger span {
                width: 25px;
                height: 2px;
                background: var(--text-primary);
                transition: all 0.3s ease;
            }

            .homework-page {
                padding-left: 2rem;
                padding-right: 2rem;
            }

            .page-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">AETHER</a>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About US</a></li>
            <li><a href="homework.html">Daily homework</a></li>
            <li><a href="final.html">Finalwork</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Homework Page Content -->
    <div class="homework-page">
        <h1 class="page-title">DAILY HOMEWORK</h1>
        
        <div id="homeworkList"></div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Aether Studio. All rights reserved.</p>
    </footer>

    <script>
        // Mobile menu
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        navMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
            });
        });

        // Homework Data with Markdown Content
        const homeworkData = [

        // Configure marked options
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Render Homework List
        function renderHomeworkList() {
            const container = document.getElementById('homeworkList');
            
            homeworkData.forEach((hw, index) => {
                const item = document.createElement('div');
                item.className = 'homework-item';
                item.innerHTML = `
                    <div class="homework-header" onclick="toggleHomework(${index})">
                        <div class="homework-info">
                            <div class="homework-number">${hw.number}</div>
                            <h3 class="homework-title">${hw.title}</h3>
                        </div>
                        <i class="fas fa-chevron-down homework-toggle"></i>
                    </div>
                    <div class="homework-content">
                        <div class="markdown-wrapper">
                            <div class="markdown-content" id="content-${index}"></div>
                        </div>
                    </div>
                `;
                
                container.appendChild(item);
                
                // Render markdown content
                setTimeout(() => {
                    document.getElementById(`content-${index}`).innerHTML = marked.parse(hw.markdown.trim());
                }, 100);
            });
        }

        // Toggle Homework Item
        function toggleHomework(index) {
            const items = document.querySelectorAll('.homework-item');
            const clickedItem = items[index];
            const isActive = clickedItem.classList.contains('active');
            
            // Close all items
            items.forEach(item => {
                item.classList.remove('active');
            });
            
            // Toggle clicked item
            if (!isActive) {
                clickedItem.classList.add('active');
                // Smooth scroll to item
                setTimeout(() => {
                    clickedItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }
        }

        // Initialize
        renderHomeworkList();
    </script>
</body>
</html>
