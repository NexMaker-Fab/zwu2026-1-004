<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Studio | Course Portfolio</title>
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --text-primary: #FFFFFF;
            --text-secondary: #999999;
            --accent-purple: #B8A9FF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-purple);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease, background 0.15s ease;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--accent-purple);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor.hover {
            transform: scale(1.5);
            background: rgba(184, 169, 255, 0.2);
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-purple);
            border-radius: 50%;
            opacity: 0.3;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 1rem 4rem;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-menu a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-purple);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .nav-menu a:hover {
            color: var(--accent-purple);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.6) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.5em;
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite, fadeIn 1s ease-out 1.5s forwards;
            opacity: 0;
        }

        .scroll-indicator i {
            font-size: 2rem;
            color: var(--accent-purple);
            text-shadow: 0 2px 10px rgba(184, 169, 255, 0.3);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Section Common Styles */
        section {
            padding: 6rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Glowing Section Divider */
        .section-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            margin: 2rem 0;
            opacity: 0.3;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* About US Section */
        .about-section {
            background: var(--bg-secondary);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        /* Team Member Cards with 3D Hover */
        .team-member {
            text-align: center;
            padding: 2rem;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .team-member::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(184, 169, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .team-member:hover::before {
            opacity: 1;
        }

        .team-member:hover {
            transform: translateY(-5px);
        }

        .member-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 300;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .member-name {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .member-id {
            font-size: 0.85rem;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
        }

        .member-bio {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Scroll Reveal Animation */
        .fade-in, .team-member, .homework-item, .process-item {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible, .team-member.visible, .homework-item.visible, .process-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Daily Homework Section */
        .homework-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
        }

        .homework-item {
            padding: 2rem;
            margin-bottom: 1rem;
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent-purple);
            transition: all 0.3s ease;
        }

        .homework-item:hover {
            background: rgba(184, 169, 255, 0.05);
            transform: translateX(10px);
        }

        .homework-title {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .homework-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border-light);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
            background: var(--bg-secondary);
        }

        .upload-area:hover {
            border-color: var(--accent-purple);
            background: rgba(184, 169, 255, 0.05);
        }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent-purple);
            margin-bottom: 1rem;
        }

        .upload-text {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .file-list {
            margin-top: 1.5rem;
            text-align: left;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .file-icon {
            color: var(--accent-purple);
            font-size: 1.2rem;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 400;
        }

        .file-size {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .file-remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.3s ease;
        }

        .file-remove:hover {
            color: #ff4757;
        }

        .upload-progress {
            margin-top: 1rem;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-progress.active {
            opacity: 1;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient-purple);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Final Project Section */
        .final-section {
            background: var(--bg-secondary);
        }

        .final-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .final-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        .final-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1.5rem 2rem;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.98);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
            }

            .nav-menu.active {
                display: flex;
            }

            .hamburger {
                display: flex;
                flex-direction: column;
                cursor: pointer;
                gap: 5px;
            }

            .hamburger span {
                width: 25px;
                height: 2px;
                background: var(--text-primary);
                transition: all 0.3s ease;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            section {
                padding: 4rem 2rem;
            }

            .team-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 2rem;
            }
        }

        /* Fade in animation */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="#" class="logo">AETHER</a>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About US</a></li>
            <li><a href="homework.html">Daily homework</a></li>
            <li><a href="final.html">Finalwork</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="26effea5eebe759563d88b21ca812014_raw.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">AETHER STUDIO</h1>
            <p class="hero-subtitle">Creative Technology Course Portfolio</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Aether Studio. All rights reserved.</p>
    </footer>

    <script>
        // Custom Cursor
        const cursor = document.createElement('div');
        cursor.className = 'cursor';
        const cursorDot = document.createElement('div');
        cursorDot.className = 'cursor-dot';
        document.body.appendChild(cursor);
        document.body.appendChild(cursorDot);

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursorDot.style.left = mouseX - 3 + 'px';
            cursorDot.style.top = mouseY - 3 + 'px';
        });

        // Smooth cursor follow
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            
            cursor.style.left = cursorX - 10 + 'px';
            cursor.style.top = cursorY - 10 + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover effect
        document.querySelectorAll('a, button, .team-member, .homework-item').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Floating Particles
        function createParticles() {
            const particlesContainer = document.createElement('div');
            particlesContainer.className = 'particles';
            document.body.appendChild(particlesContainer);

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = particle.style.height = (Math.random() * 3 + 2) + 'px';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Smooth reveal animation for Hero Title
        const heroTitle = document.querySelector('.hero-title');
        if (heroTitle) {
            heroTitle.addEventListener('mouseenter', () => {
                heroTitle.style.transition = 'all 0.5s ease';
                heroTitle.style.textShadow = '0 0 20px rgba(184, 169, 255, 0.8), 0 0 40px rgba(184, 169, 255, 0.4)';
                heroTitle.style.letterSpacing = '0.6em';
            });
            
            heroTitle.addEventListener('mouseleave', () => {
                heroTitle.style.textShadow = '0 4px 20px rgba(0, 0, 0, 0.3)';
                heroTitle.style.letterSpacing = '0.5em';
            });
        }

        // Smooth glow reveal for Section Titles
        const sectionTitles = document.querySelectorAll('.section-title');
        sectionTitles.forEach(title => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !title.classList.contains('revealed')) {
                        title.classList.add('revealed');
                        title.style.transition = 'all 0.8s ease';
                        title.style.opacity = '1';
                        title.style.transform = 'translateY(0)';
                        title.style.textShadow = '0 0 30px rgba(184, 169, 255, 0.5)';
                        
                        setTimeout(() => {
                            title.style.textShadow = 'none';
                        }, 1500);
                    }
                });
            }, { threshold: 0.5 });
            
            observer.observe(title);
            
            // Initial state
            title.style.opacity = '0';
            title.style.transform = 'translateY(20px)';
        });

        // Magnetic Effect for Buttons
        document.querySelectorAll('button, .btn-submit, a').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            });
            
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0, 0)';
            });
        });
        // Simple Upload Manager
        class UploadManager {
            constructor() {
                this.init();
            }

            init() {
                this.setupUpload('uploadArea', 'fileInput', 'fileList', 'progress', 'progressBar');
                this.setupUpload('uploadAreaFinal', 'fileInputFinal', 'fileListFinal', 'progressFinal', 'progressBarFinal');
            }

            setupUpload(areaId, inputId, listId, progressId, barId) {
                const area = document.getElementById(areaId);
                const input = document.getElementById(inputId);
                
                if (!area || !input) return;

                area.addEventListener('click', () => input.click());
                
                input.addEventListener('change', (e) => {
                    this.handleFiles(e.target.files, listId, progressId, barId);
                });

                area.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    area.style.borderColor = '#B8A9FF';
                    area.style.background = 'rgba(184, 169, 255, 0.1)';
                });

                area.addEventListener('dragleave', () => {
                    area.style.borderColor = '';
                    area.style.background = '';
                });

                area.addEventListener('drop', (e) => {
                    e.preventDefault();
                    area.style.borderColor = '';
                    area.style.background = '';
                    this.handleFiles(e.dataTransfer.files, listId, progressId, barId);
                });
            }

            handleFiles(files, listId, progressId, barId) {
                const fileList = document.getElementById(listId);
                const progressBar = document.getElementById(barId);
                const progressContainer = document.getElementById(progressId);

                Array.from(files).forEach(file => {
                    if (file.size > 10 * 1024 * 1024) {
                        alert(`File "${file.name}" exceeds 10MB limit`);
                        return;
                    }

                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    fileItem.innerHTML = `
                        <div class="file-info">
                            <i class="fas fa-file file-icon"></i>
                            <div>
                                <div class="file-name">${file.name}</div>
                                <div class="file-size">${this.formatSize(file.size)}</div>
                            </div>
                        </div>
                        <button class="file-remove" onclick="this.parentElement.remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    fileList.appendChild(fileItem);

                    // Simulate upload progress
                    progressContainer.classList.add('active');
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += Math.random() * 20;
                        if (progress >= 100) {
                            progress = 100;
                            clearInterval(interval);
                            setTimeout(() => {
                                progressContainer.classList.remove('active');
                                progressBar.style.width = '0%';
                            }, 500);
                        }
                        progressBar.style.width = progress + '%';
                    }, 150);
                });
            }

            formatSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            }
        }

        // Initialize upload
        const uploadManager = new UploadManager();

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile menu
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close mobile menu on link click
        navMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
            });
        });

        // Typing trail effect
        let typingTrail = [];
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.85) {
                const trail = document.createElement('div');
                trail.textContent = ['✦', '✧', '◇', '○', '●'][Math.floor(Math.random() * 5)];
                trail.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    color: var(--accent-purple);
                    font-size: ${Math.random() * 10 + 8}px;
                    pointer-events: none;
                    z-index: 9998;
                    opacity: 0.6;
                    animation: trailFade 1s ease-out forwards;
                `;
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 1000);
            }
        });

        // Add trail animation
        const trailStyle = document.createElement('style');
        trailStyle.textContent = `
            @keyframes trailFade {
                0% {
                    opacity: 0.6;
                    transform: translateY(0) scale(1);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-30px) scale(0.5);
                }
            }
        `;
        document.head.appendChild(trailStyle);

        // Smooth scroll reveal animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in, .team-member, .homework-item, .process-item').forEach(el => {
            observer.observe(el);
        });

        // Parallax effect for hero video
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const heroVideo = document.querySelector('.hero-video');
            if (heroVideo && scrolled < window.innerHeight) {
                heroVideo.style.transform = `translateY(${scrolled * 0.5}px)`;
            }
        });

        // Add hover tilt effect to homework items
        document.querySelectorAll('.homework-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                item.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            
            item.addEventListener('mouseleave', () => {
                item.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
            });
        });

        // 3D Tilt Effect for Team Member Cards
        document.querySelectorAll('.team-member').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
            });
        });

        // Glowing Effect for Member Avatars
        document.querySelectorAll('.member-avatar').forEach(avatar => {
            avatar.addEventListener('mouseenter', () => {
                avatar.style.boxShadow = '0 0 30px rgba(184, 169, 255, 0.6)';
                avatar.style.transform = 'scale(1.1)';
            });
            avatar.addEventListener('mouseleave', () => {
                avatar.style.boxShadow = 'none';
                avatar.style.transform = 'scale(1)';
            });
            avatar.style.transition = 'all 0.3s ease';
        });

        // Add ripple effect to buttons
        document.querySelectorAll('button, .btn-submit').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: rgba(184, 169, 255, 0.3);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: ripple 0.6s ease-out;
                    pointer-events: none;
                `;
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
