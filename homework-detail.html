        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            display: flex;

        .nav-menu {

            list-style: none;

        .detail-page {

            padding-left: 4rem;
            padding-right: 4rem;

        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-purple);
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            transition: gap 0.3s ease;
        }

        .back-link:hover {
            gap: 1rem;
        }

        .homework-header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
        }

        .homework-number {
            font-size: 0.85rem;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;

        .homework-title {
            font-size: 2.5rem;

            margin-bottom: 1rem;

        .editor-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-toggle {
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-toggle:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-toggle.active {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            color: var(--bg-primary);
        }

        /* Two Column Layout */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            min-height: 600px;
        }

        .editor-container.preview-only {
            grid-template-columns: 1fr;
        }

        .editor-container.edit-only {
            grid-template-columns: 1fr;
        }

        /* Markdown Editor */
        .markdown-editor {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 0.5rem 0.8rem;
            background: rgba(184, 169, 255, 0.1);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .toolbar-btn:hover {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            color: var(--bg-primary);
        }

        .toolbar-btn i {
            font-size: 0.9rem;
        }

            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

            width: 100%;
            min-height: 550px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 1.5rem;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        #markdownInput:focus {
            border-color: var(--accent-purple);
        }

        /* Image Upload Area */
        .image-upload-area {
            margin-top: 1rem;
            padding: 1rem;
            border: 2px dashed var(--border-light);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload-area:hover {
            border-color: var(--accent-purple);
            background: rgba(184, 169, 255, 0.05);
        }

        .image-upload-area.dragover {
            border-color: var(--accent-purple);
            background: rgba(184, 169, 255, 0.1);
        }

        .upload-icon {
            font-size: 2rem;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
        }

        .upload-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .upload-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        #imageInput {
            display: none;
        }

        .uploaded-images {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
        }

        .uploaded-image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .uploaded-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;

        .uploaded-image-item:hover .image-overlay {
            opacity: 1;
        }

            padding: 0.4rem;
            background: var(--accent-purple);
            border: none;
            border-radius: 4px;
            color: var(--bg-primary);

            font-size: 0.8rem;
            transition: transform 0.2s ease;

        .image-action-btn:hover {

        }

        .preview-panel {

            align-items: center;
            gap: 0.5rem;

        .markdown-content h2, 
        .markdown-content h3,
        .markdown-content h4, 
        .markdown-content h5, 
        .markdown-content h6 {
            margin: 1.5rem 0 1rem;
            font-weight: 400;
            color: var(--accent-purple);
        }

        .markdown-content h1 { font-size: 2rem; }
        .markdown-content h2 { font-size: 1.75rem; }
        .markdown-content h3 { font-size: 1.5rem; }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content code {
            background: rgba(184, 169, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: var(--accent-purple);
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--border-light);
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--accent-purple);
            padding-left: 1.5rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .markdown-content ul, 
        .markdown-content ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .markdown-content li {
            margin-bottom: 0.5rem;
        }

        .markdown-content a {
            color: var(--accent-purple);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--accent-purple);
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .markdown-content th, 
        .markdown-content td {
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            text-align: left;
        }

        .markdown-content th {
            background: rgba(184, 169, 255, 0.1);
            color: var(--accent-purple);
        }

        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 2rem 0;
        }

        .save-section {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

            padding: 1rem 2rem;

            border: none;
            color: var(--bg-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(184, 169, 255, 0.3);
        }

        .btn-save.saved {
            background: var(--success);
        }

        .btn-reset {
            padding: 1rem 2rem;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            border-color: #ff4757;
            color: #ff4757;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1.5rem 2rem;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.98);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;

            .hamburger {

            .detail-page {
                padding-left: 2rem;
                padding-right: 2rem;
            }

            .editor-container {
                grid-template-columns: 1fr;
            }

            .homework-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

            '7': { number: 'HOMEWORK 07', title: '3D Printer' },
            '8': { number: 'HOMEWORK 08', title: 'LASER CUTTING & CNC' },
            '9': { number: 'HOMEWORK 09', title: 'IOT AND INTERACTION' }
        };

        // Elements
        const markdownInput = document.getElementById('markdownInput');
        const previewContent = document.getElementById('previewContent');
        const editorContainer = document.getElementById('editorContainer');
        const editorPanel = document.getElementById('editorPanel');
        const previewPanel = document.getElementById('previewPanel');
        const saveBtn = document.getElementById('saveBtn');
        const imageInput = document.getElementById('imageInput');
        const uploadArea = document.getElementById('uploadArea');
        const uploadedImagesDiv = document.getElementById('uploadedImages');

        // Store uploaded images
        let uploadedImages = [];

        // Load content
        function loadContent() {
            const info = homeworkInfo[homeworkId];
            if (info) {
                document.getElementById('homeworkNumber').textContent = info.number;
                document.getElementById('homeworkTitle').textContent = info.title;
            }

            // Try to load from localStorage first
            const saved = localStorage.getItem(`homework_${homeworkId}`);
            const content = saved || defaultContents[homeworkId] || '# Start writing...';
            
            markdownInput.value = content;
            updatePreview();
        }

        // Update preview
        function updatePreview() {
            const markdown = markdownInput.value;
            previewContent.innerHTML = marked.parse(markdown);
        }

        // Real-time preview
        markdownInput.addEventListener('input', updatePreview);

        // View mode
        function setViewMode(mode) {
            // Update buttons
            document.querySelectorAll('.btn-toggle').forEach(btn => {
                btn.classList.remove('active');
            });

            if (mode === 'split') {
                document.getElementById('btnSplit').classList.add('active');
                editorContainer.className = 'editor-container';
                editorPanel.style.display = 'block';
                previewPanel.style.display = 'block';
            } else if (mode === 'preview') {
                document.getElementById('btnPreview').classList.add('active');
                editorContainer.className = 'editor-container preview-only';
                editorPanel.style.display = 'none';
                previewPanel.style.display = 'block';
            } else if (mode === 'edit') {
                document.getElementById('btnEdit').classList.add('active');
                editorContainer.className = 'editor-container edit-only';
                editorPanel.style.display = 'block';
                previewPanel.style.display = 'none';
            }
        }

        // Save content
        function saveContent() {
            const content = markdownInput.value;
            localStorage.setItem(`homework_${homeworkId}`, content);
            
            // Show saved state
            saveBtn.classList.add('saved');
            saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved!';
            
            setTimeout(() => {
                saveBtn.classList.remove('saved');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }, 2000);
        }

        // Reset content
        function resetContent() {
            if (confirm('Reset to default content? This will discard all changes.')) {
                localStorage.removeItem(`homework_${homeworkId}`);
                loadContent();
            }
        }

        // Initialize
        loadContent();

        // Insert text at cursor position
        function insertText(before, after) {
            const start = markdownInput.selectionStart;
            const end = markdownInput.selectionEnd;
            const text = markdownInput.value;
            const selectedText = text.substring(start, end);
            
            const newText = text.substring(0, start) + before + selectedText + after + text.substring(end);
            markdownInput.value = newText;
            
            // Set cursor position
            const newCursorPos = start + before.length + selectedText.length + after.length;
            markdownInput.setSelectionRange(newCursorPos, newCursorPos);
            markdownInput.focus();
            
            // Update preview
            updatePreview();
        }

        // Handle image upload
        imageInput.addEventListener('change', handleImageUpload);

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
            files.forEach(file => processImage(file));
        });

        function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => processImage(file));
            // Reset input
            e.target.value = '';
        }

        function processImage(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('Image size should be less than 5MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                const imageName = file.name;
                
                // Store image
                uploadedImages.push({
                    name: imageName,
                    data: base64
                });

                // Add to display
                displayUploadedImage(base64, uploadedImages.length - 1);

                // Insert markdown
                const markdown = `\n![${imageName}](${base64})\n`;
                insertAtCursor(markdown);
            };
            reader.readAsDataURL(file);
        }

        function displayUploadedImage(base64, index) {
            const div = document.createElement('div');
            div.className = 'uploaded-image-item';
            div.innerHTML = `
                <img src="${base64}" alt="Uploaded">
                <div class="image-overlay">
                    <button class="image-action-btn" onclick="insertImageMarkdown(${index})" title="Insert">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="image-action-btn" onclick="deleteImage(${index})" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            uploadedImagesDiv.appendChild(div);
        }

        function insertImageMarkdown(index) {
            const img = uploadedImages[index];
            if (img) {
                const markdown = `\n![${img.name}](${img.data})\n`;
                insertAtCursor(markdown);
            }
        }

        function deleteImage(index) {
            if (confirm('Delete this image?')) {
                uploadedImages.splice(index, 1);
                refreshUploadedImages();
            }
        }

        function refreshUploadedImages() {
            uploadedImagesDiv.innerHTML = '';
            uploadedImages.forEach((img, index) => {
                displayUploadedImage(img.data, index);
            });
        }

        function insertAtCursor(text) {
            const start = markdownInput.selectionStart;
            const end = markdownInput.selectionEnd;
            const value = markdownInput.value;
            
            markdownInput.value = value.substring(0, start) + text + value.substring(end);
            markdownInput.selectionStart = markdownInput.selectionEnd = start + text.length;
            markdownInput.focus();
            
            updatePreview();
        }

        // Load images from localStorage
        function loadImages() {
            const saved = localStorage.getItem(`homework_${homeworkId}_images`);
            if (saved) {
                uploadedImages = JSON.parse(saved);
                uploadedImages.forEach((img, index) => {
                    displayUploadedImage(img.data, index);
                });
            }
        }

        // Save images with content
        const originalSave = saveContent;
        saveContent = function() {
            localStorage.setItem(`homework_${homeworkId}_images`, JSON.stringify(uploadedImages));
            originalSave();
        };

        // Load images on init
        loadImages();
    </script>
</body>
</html>
